<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Konten</title>
    <link rel="stylesheet" href="detail.css" />
    <script>
      // Apply theme instantly to prevent FOUC (Flash of Unstyled Content)
      const savedTheme = localStorage.getItem("theme") || "light";
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark-mode-preload");
      }
    </script>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header kiri -->
      <div class="header-left">
        <span class="brand">Nama / Logo</span>
      </div>

      <!-- Header kanan -->
      <div class="header-right">
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">☰</button>

        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Telusuri..." />
          <button class="search-icon" id="searchBtn" aria-label="Search">🔍</button>
        </div>

        <label class="toggle-switch">
          <input type="checkbox" id="toggleSwitch" />
          <span class="toggle-slider"></span>
        </label>

        <span class="logo-text">Logo</span>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-label">Periodisasi</p>
        <nav class="nav-list" id="navList">
          <!-- Nav items will be generated by JS -->
        </nav>

        <div class="sidebar-footer">
          <a href="#" class="footer-link">Resepsi →</a>
          <a href="index.html" class="footer-link">← Main Page</a>
        </div>
      </aside>

      <!-- Konten utama -->
      <main class="main-content">
        <h1 class="content-title" id="contentTitle">
          Memuat konten...
        </h1>

        <div class="image-placeholder" id="imagePlaceholder">
          <span>Gambar Konten</span>
        </div>

        <div class="content-text" id="contentText">
          <!-- diisi otomatis lewat JS -->
        </div>

        <!-- Footer navigasi bawah -->
        <div class="content-footer-nav">
          <a href="#" class="nav-prev" id="navPrev">← Sebelumnya</a>
          <a href="#" class="nav-next" id="navNext">Selanjutnya →</a>
        </div>
      </main>
    </div>

    <script src="detail.js"></script>
  </body>
</html>
