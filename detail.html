<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />
    <title>Detail Konten</title>
    <link rel="stylesheet" href="detail.css" />
    <script>
      // Terapkan tema secara instan untuk mencegah FOUC (Flash of Unstyled Content)
      const savedTheme = localStorage.getItem("theme");
      const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      if (savedTheme === "dark" || (!savedTheme && preferredTheme === "dark")) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header kiri -->
      <div class="header-left">
        <span class="brand">Nama / Logo</span>
      </div>

      <!-- Header kanan -->
      <div class="header-right">
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">☰</button>

        <div class="search-bar">
          <input type="text" placeholder="Telusuri..." />
          <span class="search-icon">🔍</span>
        </div>

        <button class="btn theme-switch" id="theme-toggle" type="button" aria-label="Switch tema" aria-pressed="false">
            <span class="theme-switch__track">
              <span class="theme-switch__thumb">
                <i class="ri-sun-line theme-switch__icon"></i>
              </span>
            </span>
          </button>

        <span class="logo-text">Logo</span>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-label">Periodisasi</p>
        <nav class="nav-list" id="navList">
          <!-- Nav items will be generated by JS -->
        </nav>

        <div class="sidebar-footer">
          <a href="#" class="footer-link">Resepsi →</a>
          <a href="index.html" class="footer-link">← Main Page</a>
        </div>
      </aside>

      <!-- Konten utama -->
      <main class="main-content">
        <h1 class="content-title" id="contentTitle">
          Memuat konten...
        </h1>

        <div class="image-placeholder" id="imagePlaceholder">
          <span>Gambar Konten</span>
        </div>

        <div class="content-text" id="contentText">
          <!-- diisi otomatis lewat JS -->
        </div>

        <!-- Footer navigasi bawah -->
        <div class="content-footer-nav">
          <a href="#" class="nav-prev" id="navPrev">← Sebelumnya</a>
          <a href="#" class="nav-next" id="navNext">Selanjutnya →</a>
        </div>
      </main>
    </div>

    <script src="detail.js"></script>
  </body>
</html>
